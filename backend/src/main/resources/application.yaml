spring:
  application:
    name: backend
  datasource:
    url: jdbc:postgresql://localhost:5432/wave-whisper
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI}
  allowed:
    origins: ${ALLOWED_ORIGINS:http://localhost:3000}
  storage:
    url: ${SUPABASE_URL}
    key: ${SUPABASE_KEY}
    bucket: ${SUPABASE_BUCKET}
  api:
    paths:
      base: /api
      messages: ${spring.api.paths.base}/messages
      profiles: ${spring.api.paths.base}/profiles
      conversations: ${spring.api.paths.base}/conversations
